# Instruction tuning (SFT) — Colab T4
extends: ../base.yaml

stage: instruction_tuning
objective: sft

model:
  name: Qwen/Qwen2.5-1.5B-Instruct
  adapter_path: outputs/checkpoints/cpt/final
  max_seq_length: 2048

dataset:
  path: data/splits/instruct
  format: chatml

hyperparameters:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 2
  learning_rate: 2.0e-4
  max_steps: 5000
  save_total_limit: 3

trl:
  use_sft_trainer: true
  packing: false
  dataset_text_field: messages

memory:
  load_in_4bit: true
  gradient_checkpointing: true
  use_unsloth: true
