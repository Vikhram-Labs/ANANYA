name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest tests -q --tb=short

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Validate sample benchmark schema
        run: python -c "from indiclegalslm.utils.io import read_jsonl; from indiclegalslm.schemas.datasets import EvaluationRecord; [EvaluationRecord.model_validate(r) for r in read_jsonl('benchmarks/constitutional_reasoning.jsonl')]"
